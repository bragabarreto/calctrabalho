[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Migrations rodam como release command (antes do tráfego chegar ao novo deploy)
releaseCommand = "node backend/scripts/migrate.js"
# Servidor inicia diretamente (sem aguardar banco — já garantido pelo releaseCommand)
startCommand = "node backend/src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
