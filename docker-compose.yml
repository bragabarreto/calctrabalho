version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: calctrabalho_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: calctrabalho
      POSTGRES_USER: calctrabalho
      POSTGRES_PASSWORD: ${DB_PASSWORD:-calctrabalho123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calctrabalho"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: calctrabalho_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@calctrabalho.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
